# Boardly (Ruby edition) — Docker container action.
# Ruby port:      https://github.com/cdrrazan/boardly-ruby
# Main project:   https://github.com/cdrrazan/Boardly (TypeScript)
name: "Boardly (Ruby)"
description: "Config-driven automation for GitHub Projects (v2): sprint rollover, stale nudges, sub-issue gating, digests, standups, priority sort, and Slack/email notifications. Ruby port of cdrrazan/Boardly."
author: "cdrrazan"
branding:
  icon: "check-square"
  color: "blue"
inputs:
  token:
    description: >-
      Token with access to the target Project (v2). The default GITHUB_TOKEN
      usually cannot read org Projects, so a fine-grained PAT or GitHub App token
      with the `project` (read/write) and `issues` scopes is recommended.
    required: true
  config-path:
    description: "Path to the automation config file, relative to the repo root."
    required: false
    default: ".github/project-automation.yml"
  only:
    description: >-
      Run a single feature instead of every enabled one. One of:
      rollover, stale-nudge, sub-issue-gate, digest, standup, priority-sort.
    required: false
    default: ""
  dry-run:
    description: "When true, log every intended action to the audit trail but make no changes."
    required: false
    default: "false"
outputs:
  actions-count:
    description: "Number of mutating actions taken (or that would be taken in dry-run)."
runs:
  using: "docker"
  image: "Dockerfile"
  env:
    BOARDLY_TOKEN: ${{ inputs.token }}
    BOARDLY_CONFIG_PATH: ${{ inputs.config-path }}
    BOARDLY_ONLY: ${{ inputs.only }}
    BOARDLY_DRY_RUN: ${{ inputs.dry-run }}
